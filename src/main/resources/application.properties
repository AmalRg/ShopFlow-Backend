# ===== Application =====
spring.application.name=shopflow-backend
server.port=8081

# ===== MySQL Database =====
#spring.datasource.url=jdbc:mysql://localhost:3306/shopflowdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/shopflowdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.secret=MaCleSecreteSuperLonguePourLeTokenJWT1234567890
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

# ===== CORS =====
cors.allowed-origins=http://localhost:4200

# ===== Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===== Dessactiver warnings =====
spring.jpa.open-in-view=false